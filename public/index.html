<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Divya Bajaj</title>
  <style>
    html,body{margin:0;padding:0;width:100%;height:100%;background:#08070a;overflow:hidden}
    #page{width:100%;height:100%;border:0;display:block;background:#08070a}
    #loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#08070a;color:#f4efe7;font-family:Arial,sans-serif;z-index:10;text-align:center;padding:24px}
    #loader p{color:#b9afa2;line-height:1.6}
  </style>
</head>
<body>
  <div id="loader"><div><h1>Loading Divya Bajaj...</h1><p>Please wait while the page opens.</p></div></div>
  <iframe id="page" src="/landing.html"></iframe>
  <script>
    var frame=document.getElementById('page');
    var loader=document.getElementById('loader');
    frame.addEventListener('load',function(){
      try{
        var doc=frame.contentDocument || frame.contentWindow.document;
        var script=doc.createElement('script');
        script.src='/flow-fix.js?v=5';
        doc.body.appendChild(script);
      }catch(error){
        console.error('Could not inject flow fix',error);
      }
      if(loader) loader.style.display='none';
    });
  </script>
</body>
</html>
